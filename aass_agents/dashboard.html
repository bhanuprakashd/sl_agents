<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SL Agent OS — Command Center</title>
<style>
/* ── CSS Variables ─────────────────────────────────────────────────────── */
:root {
  --bg: #0a0b10;
  --surface: #12131a;
  --elevated: #1a1c28;
  --elevated2: #222538;
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.12);
  --text: #e2e8f0;
  --text-secondary: #94a3b8;
  --muted: #64748b;
  --indigo: #6366f1;
  --indigo-light: #818cf8;
  --indigo-glow: rgba(99,102,241,0.15);
  /* Department colors */
  --sales: #3b82f6;
  --marketing: #a855f7;
  --product: #10b981;
  --engineering: #f59e0b;
  --research: #14b8a6;
  --qa: #ef4444;
  --autoresearcher: #f97316;
  --forge: #ec4899;
  --shared: #6366f1;
  /* Semantic */
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --info: #3b82f6;
  /* Layout */
  --sidebar-width: 260px;
  --sidebar-collapsed: 64px;
  --topbar-height: 48px;
  --transition: 200ms ease;
}

/* ── Reset & Base ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #475569; }

/* ── Animations ────────────────────────────────────────────────────────── */
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
@keyframes slideInLeft { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes dotTravel { 0% { offset-distance: 0%; } 100% { offset-distance: 100%; } }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Layout ────────────────────────────────────────────────────────────── */
.app { display: grid; grid-template-rows: var(--topbar-height) 1fr; grid-template-columns: var(--sidebar-width) 1fr; height: 100vh; transition: grid-template-columns var(--transition); }
.app.collapsed { grid-template-columns: var(--sidebar-collapsed) 1fr; }

/* ── Top Bar ───────────────────────────────────────────────────────────── */
.topbar {
  grid-column: 1 / -1;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  z-index: 100;
}
.topbar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 200px;
}
.topbar-logo-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--indigo), var(--marketing));
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
}
.topbar-logo-icon svg { width: 16px; height: 16px; fill: white; }
.topbar-logo-text { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
.topbar-logo-sub { font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; margin-left: 8px; }
.topbar-center { display: flex; gap: 12px; flex: 1; justify-content: center; flex-wrap: wrap; }
.topbar-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 12px;
  background: var(--elevated);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  white-space: nowrap;
}
.topbar-chip .chip-value { color: var(--text); }
.topbar-chip.alert { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); }
.topbar-chip.alert .chip-value { color: var(--danger); }
.topbar-right { display: flex; align-items: center; gap: 12px; min-width: 140px; justify-content: flex-end; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
.status-dot.error { background: var(--danger); }
.status-dot.pulse { animation: pulse 2s ease-in-out infinite; }
.topbar-time { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }

/* ── Sidebar ───────────────────────────────────────────────────────────── */
.sidebar {
  background: rgba(18,19,26,0.85);
  backdrop-filter: blur(12px);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width var(--transition);
}
.sidebar-nav { flex: 1; padding: 12px 8px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--muted);
  font-size: 13px;
  font-weight: 500;
  transition: all var(--transition);
  white-space: nowrap;
  overflow: hidden;
  position: relative;
  border: 1px solid transparent;
}
.nav-item:hover { color: var(--text-secondary); background: rgba(255,255,255,0.04); }
.nav-item.active {
  color: var(--text);
  background: var(--indigo-glow);
  border-color: rgba(99,102,241,0.2);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 25%; height: 50%;
  width: 3px;
  background: var(--indigo);
  border-radius: 0 3px 3px 0;
}
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }
.nav-item.active svg { opacity: 1; }
.nav-label { overflow: hidden; text-overflow: ellipsis; }
.app.collapsed .nav-label { display: none; }
.app.collapsed .nav-item { justify-content: center; padding: 10px; }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.collapse-btn {
  background: none; border: none; color: var(--muted); cursor: pointer;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 6px; transition: all var(--transition);
}
.collapse-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.collapse-btn svg { width: 16px; height: 16px; transition: transform var(--transition); }
.app.collapsed .collapse-btn svg { transform: rotate(180deg); }
.version-badge { font-size: 10px; color: var(--muted); background: var(--elevated); padding: 2px 8px; border-radius: 4px; }
.app.collapsed .version-badge { display: none; }

/* ── Main Content ──────────────────────────────────────────────────────── */
.main-content {
  overflow-y: auto;
  padding: 28px 32px;
  background: var(--bg);
}
.view { display: none; animation: fadeIn 300ms ease; }
.view.active { display: block; }

/* ── Component: Glass Card ─────────────────────────────────────────────── */
.glass-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  transition: all var(--transition);
}
.glass-card:hover { border-color: var(--border-strong); }
.glass-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.glass-card-title { font-size: 14px; font-weight: 600; }
.glass-card-subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── Component: KPI Card ───────────────────────────────────────────────── */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.kpi-card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
.kpi-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.kpi-value { font-size: 32px; font-weight: 700; line-height: 1; margin-bottom: 4px; font-variant-numeric: tabular-nums; }
.kpi-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.kpi-icon { position: absolute; top: 16px; right: 16px; opacity: 0.15; }
.kpi-icon svg { width: 32px; height: 32px; }

/* ── Component: Status Pill ────────────────────────────────────────────── */
.pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.pill-closed { background: rgba(16,185,129,0.12); color: #34d399; }
.pill-open { background: rgba(239,68,68,0.12); color: #f87171; }
.pill-half-open { background: rgba(245,158,11,0.12); color: #fbbf24; }
.pill-running { background: rgba(99,102,241,0.12); color: #818cf8; animation: pulse 2s ease-in-out infinite; }
.pill-completed { background: rgba(16,185,129,0.12); color: #34d399; }
.pill-failed { background: rgba(239,68,68,0.12); color: #f87171; }
.pill-blocked { background: rgba(245,158,11,0.12); color: #fbbf24; }
.pill-pending { background: rgba(148,163,184,0.12); color: #94a3b8; }
.pill-stable { background: rgba(16,185,129,0.12); color: #34d399; }
.pill-pending_watch { background: rgba(99,102,241,0.12); color: #818cf8; }
.pill-rolled_back { background: rgba(239,68,68,0.12); color: #f87171; }

/* ── Component: Department Badge ───────────────────────────────────────── */
.dept-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.dept-sales { background: rgba(59,130,246,0.15); color: #93c5fd; }
.dept-marketing { background: rgba(168,85,247,0.15); color: #c084fc; }
.dept-product { background: rgba(16,185,129,0.15); color: #6ee7b7; }
.dept-engineering { background: rgba(245,158,11,0.15); color: #fcd34d; }
.dept-research { background: rgba(20,184,166,0.15); color: #5eead4; }
.dept-qa { background: rgba(239,68,68,0.15); color: #fca5a5; }
.dept-autoresearcher { background: rgba(249,115,22,0.15); color: #fdba74; }
.dept-forge { background: rgba(236,72,153,0.15); color: #f9a8d4; }
.dept-shared { background: rgba(99,102,241,0.15); color: #a5b4fc; }
.dept-orchestrators { background: rgba(99,102,241,0.15); color: #a5b4fc; }

/* ── Component: Data Table ─────────────────────────────────────────────── */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th {
  text-align: left; padding: 10px 12px;
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--muted); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--surface); z-index: 1;
}
.data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.data-table tr:hover td { background: rgba(255,255,255,0.02); }
.data-table .mono { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; font-size: 11px; }
.data-table .truncate { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Component: Event Badge ────────────────────────────────────────────── */
.event-badge { display: inline-block; padding: 1px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; font-family: monospace; }
.event-agent-called { background: rgba(59,130,246,0.15); color: #93c5fd; }
.event-agent-returned { background: rgba(16,185,129,0.15); color: #6ee7b7; }
.event-circuit-opened { background: rgba(239,68,68,0.15); color: #fca5a5; }
.event-circuit-closed { background: rgba(16,185,129,0.15); color: #6ee7b7; }
.event-dlq-pushed { background: rgba(245,158,11,0.15); color: #fcd34d; }
.event-run-failed { background: rgba(239,68,68,0.15); color: #fca5a5; }

/* ── Component: Button ─────────────────────────────────────────────────── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all var(--transition); }
.btn-primary { background: var(--indigo); color: white; }
.btn-primary:hover { background: #5558e6; }
.btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
.btn-ghost:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.btn-danger { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background: rgba(239,68,68,0.2); }
.btn-sm { padding: 4px 10px; font-size: 11px; }

/* ── Component: Input ──────────────────────────────────────────────────── */
.input {
  background: var(--elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 13px;
  width: 100%;
  outline: none;
  transition: border-color var(--transition);
}
.input:focus { border-color: var(--indigo); }
.input::placeholder { color: var(--muted); }

/* ── Component: Tabs (sub-navigation) ──────────────────────────────────── */
.sub-tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 0; overflow-x: auto; }
.sub-tab {
  padding: 8px 16px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent; transition: all var(--transition); white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none;
}
.sub-tab:hover { color: var(--text-secondary); }
.sub-tab.active { color: var(--indigo-light); border-bottom-color: var(--indigo); }

/* ── Component: Filter Chips ───────────────────────────────────────────── */
.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.filter-chip {
  padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
  background: var(--elevated); border: 1px solid var(--border); color: var(--muted);
  cursor: pointer; transition: all var(--transition); white-space: nowrap;
}
.filter-chip:hover { color: var(--text-secondary); border-color: var(--border-strong); }
.filter-chip.active { background: var(--indigo-glow); border-color: rgba(99,102,241,0.3); color: var(--indigo-light); }

/* ── Component: Alert Banner ───────────────────────────────────────────── */
.alert-banner { padding: 12px 16px; border-radius: 8px; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.alert-danger { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
.alert-warning { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); color: #fcd34d; }
.alert-success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); color: #6ee7b7; }

/* ── Dept Health Grid ──────────────────────────────────────────────────── */
.dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
.dept-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; cursor: pointer; transition: all var(--transition);
}
.dept-card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
.dept-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.dept-card-name { font-size: 13px; font-weight: 700; }
.dept-card-count { font-size: 11px; color: var(--muted); }
.dept-card-agents { font-size: 10px; color: var(--muted); line-height: 1.6; }

/* ── Two Column Layout ─────────────────────────────────────────────────── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
@media (max-width: 1000px) { .two-col { grid-template-columns: 1fr; } }

/* ── Agent Card Grid ───────────────────────────────────────────────────── */
.agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.agent-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; transition: all var(--transition);
}
.agent-card:hover { border-color: var(--border-strong); }
.agent-card-top { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 12px; }
.agent-card-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.agent-card-icon svg { width: 18px; height: 18px; opacity: 0.9; }
.agent-card-name { font-size: 13px; font-weight: 700; }
.agent-card-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
.agent-card-status { display: flex; gap: 16px; padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 11px; }
.agent-card-status-item { display: flex; align-items: center; gap: 4px; }
.agent-card-status-label { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 9px; letter-spacing: 0.5px; }
.agent-card-body { padding: 12px 16px; }
.agent-card-section { margin-bottom: 10px; }
.agent-card-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 6px; }
.agent-card-list { list-style: none; font-size: 11px; }
.agent-card-list li { padding: 2px 0; padding-left: 10px; border-left: 2px solid var(--border); color: var(--text-secondary); }
.agent-card-tools { display: flex; flex-wrap: wrap; gap: 4px; }
.tool-chip { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-family: monospace; background: rgba(168,85,247,0.1); color: #c084fc; }
.agent-card-reflection { background: var(--elevated); padding: 10px; border-radius: 6px; font-size: 10px; color: var(--text-secondary); line-height: 1.5; }

/* ── Console ───────────────────────────────────────────────────────────── */
.console-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
.console-input-row .input { flex: 1; }
.console-panes { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; height: calc(100vh - 250px); }
.console-pane { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
.console-pane-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.console-pane-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.console-pane-body { flex: 1; overflow-y: auto; padding: 12px; font-size: 12px; }
.console-event { display: flex; gap: 8px; padding: 6px 8px; border-radius: 6px; margin-bottom: 4px; border-left: 3px solid transparent; }
.console-event:hover { background: rgba(255,255,255,0.02); }
.console-event-time { font-size: 10px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 40px; }
.console-event-agent { font-family: monospace; font-size: 11px; font-weight: 600; min-width: 120px; }
.console-event-text { color: var(--text-secondary); font-size: 11px; flex: 1; overflow-wrap: break-word; }
.console-status-bar { padding: 8px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--muted); flex-shrink: 0; }
.console-output-content { white-space: pre-wrap; font-size: 13px; line-height: 1.6; color: var(--text); }
.console-panes.has-preview { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.console-panes.has-preview .console-pane:first-child { grid-row: 1 / 2; grid-column: 1 / 2; }
.console-panes.has-preview .console-pane:nth-child(2) { grid-row: 2 / 3; grid-column: 1 / 2; }
.console-panes.has-preview .console-preview { grid-row: 1 / 3; grid-column: 2 / 3; }
.console-preview { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
.console-preview iframe { flex: 1; border: none; background: #fff; border-radius: 0 0 12px 12px; }
.console-preview-toolbar { display: flex; align-items: center; gap: 8px; padding: 4px 12px; background: var(--elevated); border-top: 1px solid var(--border); font-size: 11px; }
.console-preview-toolbar .url-bar { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; color: var(--text-secondary); font-family: monospace; font-size: 11px; }

/* ── Org Chart ─────────────────────────────────────────────────────────── */
.orgchart-container { width: 100%; height: calc(100vh - 160px); position: relative; overflow: hidden; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); }
.orgchart-canvas { width: 100%; height: 100%; cursor: grab; }
.orgchart-canvas:active { cursor: grabbing; }
.orgchart-controls { position: absolute; top: 12px; right: 12px; display: flex; flex-direction: column; gap: 4px; }
.orgchart-controls button {
  width: 32px; height: 32px; border-radius: 6px;
  background: var(--elevated); border: 1px solid var(--border);
  color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all var(--transition);
}
.orgchart-controls button:hover { background: var(--elevated2); color: var(--text); }
.orgchart-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }

/* ── Pipeline Viz ──────────────────────────────────────────────────────── */
.pipeline-launcher { margin-bottom: 24px; }
.pipeline-launcher .input { font-size: 15px; padding: 14px 18px; }
.pipeline-launcher-chips { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.pipeline-chip { padding: 6px 14px; border-radius: 20px; font-size: 12px; background: var(--elevated); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; transition: all var(--transition); }
.pipeline-chip:hover { border-color: var(--indigo); color: var(--indigo-light); }
.pipeline-viz { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; min-height: 300px; padding: 24px; margin-bottom: 24px; overflow-x: auto; position: relative; }
.pipeline-node {
  display: inline-flex; flex-direction: column; align-items: center;
  background: var(--elevated); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 16px; min-width: 140px; text-align: center; position: relative;
  transition: all var(--transition);
}
.pipeline-node:hover { border-color: var(--border-strong); }
.pipeline-node-name { font-size: 11px; font-weight: 700; }
.pipeline-node-dept { font-size: 9px; color: var(--muted); margin-top: 2px; }
.pipeline-node-status { font-size: 16px; margin-top: 4px; }

/* ── Step Flow (Workflows) ─────────────────────────────────────────────── */
.step-flow { padding: 16px 0; }
.step-item { display: flex; gap: 16px; margin-bottom: 0; position: relative; }
.step-line { width: 32px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.step-circle {
  width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--muted);
  background: var(--surface); z-index: 1; flex-shrink: 0;
}
.step-connector { width: 2px; flex: 1; background: var(--border); min-height: 20px; }
.step-content {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; flex: 1; margin-bottom: 12px;
}
.step-content.handoff { border-style: dashed; border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.03); }
.step-title { font-size: 12px; font-weight: 700; }
.step-agent { font-size: 11px; color: var(--indigo-light); cursor: pointer; }
.step-agent:hover { text-decoration: underline; }
.step-desc { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
.step-output { margin-top: 8px; padding: 8px 10px; background: var(--elevated); border-radius: 6px; font-size: 11px; color: var(--text-secondary); }

/* ── Handoff Cards ─────────────────────────────────────────────────────── */
.handoff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; margin-bottom: 24px; }
.handoff-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.handoff-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.handoff-arrow { font-size: 14px; color: var(--muted); }
.handoff-fields { list-style: none; }
.handoff-fields li { padding: 4px 0 4px 10px; font-size: 11px; color: var(--text-secondary); border-left: 2px solid; }

/* ── Forge Pipeline ────────────────────────────────────────────────────── */
.forge-pipeline { display: flex; gap: 12px; overflow-x: auto; padding: 16px 0; margin-bottom: 24px; }
.forge-stage {
  min-width: 160px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; text-align: center; flex-shrink: 0;
  transition: all var(--transition);
}
.forge-stage:hover { border-color: var(--border-strong); }
.forge-stage-num { font-size: 24px; font-weight: 800; color: var(--forge); opacity: 0.3; }
.forge-stage-name { font-size: 12px; font-weight: 700; margin-top: 4px; }
.forge-stage-agent { font-size: 10px; color: var(--muted); margin-top: 2px; }
.forge-stage-gate { font-size: 9px; color: var(--warning); margin-top: 4px; }
.forge-connector { display: flex; align-items: center; color: var(--muted); flex-shrink: 0; }

/* ── Scoring Grid ──────────────────────────────────────────────────────── */
.score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.score-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
.score-value { font-size: 28px; font-weight: 800; color: var(--forge); }
.score-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── RAMP Cards ────────────────────────────────────────────────────────── */
.ramp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
.ramp-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.ramp-icon { font-size: 28px; margin-bottom: 12px; }
.ramp-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.ramp-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
.ramp-metric { margin-top: 12px; padding: 6px 10px; background: var(--elevated); border-radius: 6px; font-size: 11px; font-weight: 600; color: var(--success); }

/* ── Tech Stack Tables ─────────────────────────────────────────────────── */
.tech-section { margin-bottom: 24px; }
.tech-section-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.tech-section-title svg { width: 16px; height: 16px; color: var(--muted); }

/* ── Cycle Diagram (Autoresearcher) ────────────────────────────────────── */
.cycle-diagram { display: flex; justify-content: center; padding: 20px; }

/* ── Slide-out Panel ───────────────────────────────────────────────────── */
.slide-panel {
  position: fixed; top: var(--topbar-height); right: 0; bottom: 0;
  width: 420px; background: var(--surface); border-left: 1px solid var(--border);
  z-index: 200; transform: translateX(100%); transition: transform 300ms ease;
  overflow-y: auto; padding: 24px;
}
.slide-panel.open { transform: translateX(0); }
.slide-panel-close { position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; }
.slide-panel-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 199;
  display: none;
}
.slide-panel-overlay.open { display: block; }

/* ── Monitor View ─────────────────────────────────────────────────────── */
.monitor-toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.monitor-toolbar select, .monitor-toolbar input {
  background: var(--elevated); border: 1px solid var(--border-strong); color: var(--text); border-radius: 6px;
  padding: 6px 10px; font-size: 12px; outline: none;
}
.monitor-toolbar select:focus, .monitor-toolbar input:focus { border-color: var(--indigo); }
.monitor-toolbar .spacer { flex: 1; }
.monitor-log {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  font-size: 12px; line-height: 1.6; overflow-y: auto; padding: 12px 16px;
  max-height: calc(100vh - 240px); scroll-behavior: smooth;
}
.log-entry { padding: 3px 0; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: baseline; }
.log-entry:last-child { border-bottom: none; }
.log-time { color: var(--muted); white-space: nowrap; min-width: 80px; font-variant-numeric: tabular-nums; }
.log-agent { min-width: 140px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.log-type { min-width: 100px; }
.log-msg { flex: 1; color: var(--text-secondary); word-break: break-word; }
.log-entry.level-error { background: rgba(239,68,68,0.06); }
.log-entry.level-error .log-msg { color: var(--danger); }
.log-entry.level-warning .log-msg { color: var(--warning); }
.log-entry.level-success .log-msg { color: var(--success); }
.monitor-stats { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
.monitor-stat {
  background: var(--elevated); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 16px; display: flex; flex-direction: column; gap: 2px; min-width: 120px;
}
.monitor-stat-value { font-size: 20px; font-weight: 700; }
.monitor-stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

/* ── Section Heading ───────────────────────────────────────────────────── */
.view-header { margin-bottom: 24px; }
.view-title { font-size: 22px; font-weight: 700; }
.view-subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; }

/* ── Responsive ────────────────────────────────────────────────────────── */
@media (max-width: 1400px) {
  .app { grid-template-columns: var(--sidebar-collapsed) 1fr; }
  .app .nav-label { display: none; }
  .app .nav-item { justify-content: center; padding: 10px; }
  .app .version-badge { display: none; }
}
@media (max-width: 1000px) {
  .app { grid-template-columns: 0 1fr; }
  .sidebar { display: none; }
  .console-panes { grid-template-columns: 1fr; }
  .console-panes.has-preview { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; }
  .console-panes.has-preview .console-preview { grid-row: auto; grid-column: auto; }
  .agent-grid { grid-template-columns: 1fr; }
}

/* ── Empty State ───────────────────────────────────────────────────────── */
.empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
.empty-state-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }
.empty-state-text { font-size: 13px; }
</style>

<script>
'use strict';
// ── State ─────────────────────────────────────────────────────────────────
const S = {
  view: 'dashboard',
  pollTimer: null,
  sseController: null,
  consoleEvents: [],
  consoleOutput: '',
  consoleRunning: false,
  previewUrl: '',
  sessionId: crypto.randomUUID(),
};

// ── API ───────────────────────────────────────────────────────────────────
const API = {
  async get(path) {
    try {
      const r = await fetch(path);
      if (!r.ok) throw new Error(r.statusText);
      return await r.json();
    } catch (e) {
      console.warn('API error:', path, e);
      return null;
    }
  },
  async post(path, body) {
    try {
      const r = await fetch(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      return await r.json();
    } catch (e) {
      console.warn('API error:', path, e);
      return null;
    }
  },
};

// ── Utilities ─────────────────────────────────────────────────────────────
function $(sel, ctx = document) { return ctx.querySelector(sel); }
function $$(sel, ctx = document) { return [...ctx.querySelectorAll(sel)]; }
function html(el, h) { el.innerHTML = h; }
function relTime(iso) {
  if (!iso) return '—';
  const d = (Date.now() - new Date(iso).getTime()) / 1000;
  if (d < 60) return `${Math.floor(d)}s ago`;
  if (d < 3600) return `${Math.floor(d / 60)}m ago`;
  if (d < 86400) return `${Math.floor(d / 3600)}h ago`;
  return `${Math.floor(d / 86400)}d ago`;
}
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function truncate(s, n = 60) { const e = esc(s); return e && e.length > n ? e.slice(0, n) + '...' : (e || '—'); }
function deptColor(dept) {
  const map = { sales: 'var(--sales)', marketing: 'var(--marketing)', product: 'var(--product)',
    engineering: 'var(--engineering)', research: 'var(--research)', qa: 'var(--qa)',
    autoresearcher: 'var(--autoresearcher)', forge: 'var(--forge)', shared: 'var(--shared)', orchestrators: 'var(--shared)' };
  return map[dept] || 'var(--muted)';
}
function deptClass(dept) { return 'dept-' + (dept || 'shared').toLowerCase().replace(/[^a-z]/g, ''); }
function pillClass(status) { return 'pill pill-' + (status || 'pending').toLowerCase().replace(/[^a-z_]/g, ''); }
function eventBadgeClass(type) { return 'event-badge event-' + (type || '').replace(/\./g, '-'); }

// ── Navigation ────────────────────────────────────────────────────────────
function navigate(view) {
  S.view = view;
  $$('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));
  $$('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + view));
  const renderFn = views[view];
  if (renderFn) renderFn();
}

// ── Sidebar Collapse ──────────────────────────────────────────────────────
$('#collapse-btn').addEventListener('click', () => {
  $('#app').classList.toggle('collapsed');
});

// ── Nav Click Handlers ────────────────────────────────────────────────────
$$('.nav-item').forEach(n => {
  n.addEventListener('click', () => navigate(n.dataset.view));
});

// ── Slide Panel ───────────────────────────────────────────────────────────
function openPanel(contentHtml) {
  html($('#panel-content'), contentHtml);
  $('#slide-panel').classList.add('open');
  $('#panel-overlay').classList.add('open');
}
function closePanel() {
  $('#slide-panel').classList.remove('open');
  $('#panel-overlay').classList.remove('open');
}
$('#panel-close').addEventListener('click', closePanel);
$('#panel-overlay').addEventListener('click', closePanel);

// ── Top Bar Polling ───────────────────────────────────────────────────────
async function refreshTopBar() {
  const d = await API.get('/api/status/live');
  if (d) {
    $('#chip-agents').textContent = d.agent_count || 62;
    $('#chip-runs').textContent = d.active_runs || 0;
    $('#chip-breakers').textContent = d.open_breakers || 0;
    $('#chip-dlq').textContent = d.dlq_count || 0;
    $('#chip-model').textContent = d.model || '—';
    const bw = $('#chip-breakers-wrap');
    const dw = $('#chip-dlq-wrap');
    const rw = $('#chip-runs-wrap');
    bw.classList.toggle('alert', d.open_breakers > 0);
    dw.classList.toggle('alert', d.dlq_count > 0);
    rw.classList.toggle('alert', false);
    if (d.active_runs > 0) { rw.style.borderColor = 'rgba(99,102,241,0.3)'; rw.style.background = 'rgba(99,102,241,0.08)'; }
    else { rw.style.borderColor = ''; rw.style.background = ''; }
    $('#conn-dot').classList.remove('error');
    $('#conn-dot').classList.add('pulse');
    $('#last-refresh').textContent = new Date().toLocaleTimeString();
  } else {
    $('#conn-dot').classList.add('error');
    $('#conn-dot').classList.remove('pulse');
  }
}

        <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--forge);border-radius:12px 0 0 12px"></div>
      </div>

  const deptGrid = $('#dept-health-grid');
  html(deptGrid, DEPTS.map(d => {
    const agents = getAgentsByDept(d.id);
    const hasOpen = agents.some(a => statusMap[a.name]?.circuit_state === 'open');
    const hasHalf = agents.some(a => statusMap[a.name]?.circuit_state === 'half-open');
    const dot = hasOpen ? 'var(--danger)' : hasHalf ? 'var(--warning)' : 'var(--success)';
    return `<div class="dept-card" onclick="navigate('agents')">
      <div style="height:3px;background:${d.color};border-radius:3px 3px 0 0;margin:-16px -16px 12px -16px"></div>

  // Load events
  const events = await API.get('/api/supervisor/events?limit=20') || [];
  html($('#dash-events'), events.length === 0
    ? '<div class="empty-state"><div class="empty-state-text">No recent activity — run a prompt from Console or Company Pipeline</div></div>'

        <span style="color:var(--muted);min-width:55px;font-variant-numeric:tabular-nums">${relTime(e.created_at)}</span>

        <span style="color:${deptColor(getAgent(e.agent_name)?.dept)};font-family:monospace">${esc(e.agent_name)}</span>
      </div>`).join('')
  );

  // Load runs
  const runs = await API.get('/api/supervisor/runs?limit=10') || [];
  html($('#dash-runs'), runs.length === 0
    ? '<div class="empty-state"><div class="empty-state-text">No active pipelines</div></div>'
    : `<table class="data-table"><thead><tr><th>Run ID</th><th>Type</th><th>Status</th><th>Step</th><th>Started</th></tr></thead><tbody>
      ${runs.map(r => `<tr style="cursor:pointer" onclick="navigate('pipeline')">
        <td class="mono">${truncate(r.run_id, 12)}</td>
        <td><span class="dept-badge dept-shared">${r.pipeline_type || '—'}</span></td>
        <td><span class="${pillClass(r.status)}">${r.status}</span></td>
        <td>${r.current_step || 0}/${r.total_steps || '?'}</td>
        <td style="color:var(--muted)">${relTime(r.created_at)}</td>
      </tr>`).join('')}
      </tbody></table>`
  );
};

function clearConsole() {

  if (S.sseController) { S.sseController.abort(); S.sseController = null; }
  navigate('console');
}

async function runConsole() {
  const input = $('#console-input');
  if (!input) return;
  const prompt = input.value.trim();
  if (!prompt) return;

  S.consoleEvents = [];
  S.consoleOutput = '';
  S.consoleRunning = true;
  navigate('console');

  const startTime = Date.now();
  const timerEl = $('#console-timer');
  const timerInt = setInterval(() => {
    if (timerEl) timerEl.textContent = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
  }, 100);

  S.sseController = new AbortController();

  // SSE stream reader with keepalive-aware parsing
  async function _readStream(resp) {
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let gotDone = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        // Skip SSE keepalive comments (": keepalive")
        if (line.startsWith(':')) continue;
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          const elapsed = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
          if (data.type === 'done') {
            gotDone = true;
          } else if (data.type === 'agent_text' || data.type === 'tool_call' || data.type === 'tool_result') {
            S.consoleEvents.push({ type: data.type, agent: data.agent || '', text: data.text || data.tool || '', time: elapsed });
            // Detect live URL from tool results (build_with_feedback_loop, build_review_improve)
            const raw = data.result || data.text || '';
            const urlMatch = raw.match(/https?:\/\/localhost:\d+/);
            if (urlMatch && !S.previewUrl) {
              S.previewUrl = urlMatch[0];
              navigate('console');
            }
          } else if (data.type === 'final') {
            S.consoleOutput = data.text || '';
            S.consoleEvents.push({ type: 'final', agent: data.agent || '', text: 'Final output received', time: elapsed });
            // Also check final output for URL
            const finalUrlMatch = (data.text || '').match(/https?:\/\/localhost:\d+/);
            if (finalUrlMatch && !S.previewUrl) {
              S.previewUrl = finalUrlMatch[0];
              navigate('console');
            }
          } else if (data.type === 'error') {
            S.consoleEvents.push({ type: 'error', agent: '', text: data.message || data.text || 'Error occurred', time: elapsed });
          }
          // Update UI
          const evBody = $('#console-events-body');
          if (evBody) {
            evBody.innerHTML = S.consoleEvents.map(renderConsoleEvent).join('');
            evBody.scrollTop = evBody.scrollHeight;
          }
          const outBody = $('#console-output-body');
          if (outBody && S.consoleOutput) {
            outBody.innerHTML = `<div class="console-output-content">${esc(S.consoleOutput)}</div>`;
          }
          const activeAgent = $('#console-active-agent');
          if (activeAgent && data.agent) activeAgent.textContent = data.agent;
          const countEl = $('#console-event-count');
          if (countEl) countEl.textContent = S.consoleEvents.length + ' events';
        } catch (_) {}
      }
    }
    return gotDone;
  }

  try {
    const resp = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, session_id: S.sessionId }),
      signal: S.sseController.signal,
    });
    await _readStream(resp);
  } catch (e) {
    if (e.name !== 'AbortError') {
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
      S.consoleEvents.push({ type: 'error', agent: '', text: 'Connection failed: ' + e.message, time: elapsed });
      // Update UI with error
      const evBody = $('#console-events-body');
      if (evBody) {
        evBody.innerHTML = S.consoleEvents.map(renderConsoleEvent).join('');
        evBody.scrollTop = evBody.scrollHeight;
      }
    }
  }

  S.consoleRunning = false;
  clearInterval(timerInt);
  const statusDot = $('.console-status-bar .status-dot');
  if (statusDot) { statusDot.classList.remove('pulse'); statusDot.style.background = 'var(--muted)'; }
  const statusText = $('.console-status-bar span:first-child span:last-child');
  if (statusText) statusText.textContent = 'Done';
}

let orgScale = 1, orgPanX = 0, orgPanY = 0;
// Node positions keyed by agent name — survives re-renders
const orgPositions = {};
let orgEdges = []; // [{from, to, color}]
let orgStatusMap = {};
let orgDraggingNode = null;

function orgZoom(factor) {
  orgScale *= factor;
  _orgApplyTransform();
}
function orgFit() {
  orgScale = 1; orgPanX = 0; orgPanY = 0;
  _orgApplyTransform();
}
function orgAutoArrange() {
  // Reset to default computed layout
  const svg = $('#orgchart-svg');
  if (!svg) return;
  const W = svg.clientWidth || 1200;
  _orgComputeLayout(W);
  _orgRedraw();
}
function _orgApplyTransform() {
  const g = $('#orgchart-svg > g');
  if (g) g.setAttribute('transform', `translate(${orgPanX},${orgPanY}) scale(${orgScale})`);
}

function _orgComputeLayout(W) {
  const topY = 40, deptY = 140, leafY = 260;
  const depts = DEPTS.filter(d => d.id !== 'shared');
  const deptSpacing = (W - 80) / depts.length;
  const ccx = W / 2;

  orgPositions['company_orchestrator'] = { x: ccx, y: topY };
  orgEdges = [];

  depts.forEach((d, i) => {
    const dx = 40 + i * deptSpacing + deptSpacing / 2;
    const orchName = d.id === 'forge' ? 'forge_orchestrator' : d.id + '_orchestrator';
    orgPositions[orchName] = { x: dx, y: deptY };
    orgEdges.push({ from: 'company_orchestrator', to: orchName, color: d.color });

    const leaves = AGENTS.filter(a => a.dept === d.id && !a.name.includes('orchestrator'));
    const leafSpacing = Math.min(deptSpacing / (leaves.length + 1), 50);
    const startX = dx - (leaves.length - 1) * leafSpacing / 2;
    leaves.forEach((a, j) => {
      orgPositions[a.name] = { x: startX + j * leafSpacing, y: leafY + (j % 2) * 50 };
      orgEdges.push({ from: orchName, to: a.name, color: d.color });
    });
  });
}

function _orgRedraw() {
  const svg = $('#orgchart-svg');
  if (!svg) return;

  // Build edges
  let lines = '';
  orgEdges.forEach(e => {
    const fp = orgPositions[e.from], tp = orgPositions[e.to];
    if (!fp || !tp) return;
    lines += `<line class="org-line" data-from="${e.from}" data-to="${e.to}"
      x1="${fp.x}" y1="${fp.y + 22}" x2="${tp.x}" y2="${tp.y - 18}"
      stroke="${e.color}" stroke-opacity="0.3" stroke-width="1.5"/>`;
  });

  // Build nodes
  let nodes = '';
  const allNames = Object.keys(orgPositions);
  allNames.forEach(name => {
    const pos = orgPositions[name];
    const isSmall = !name.includes('orchestrator');
    const agent = AGENTS.find(a => a.name === name);
    const dept = agent ? agent.dept : 'shared';
    const label = agent ? agent.title : name.replace(/_/g, ' ');
    nodes += _orgNodeSVG(pos.x, pos.y, name, label, dept, isSmall);
  });

  svg.innerHTML = `<g transform="translate(${orgPanX},${orgPanY}) scale(${orgScale})">${lines}${nodes}</g>`;

  // Attach drag + click handlers to each node
  $$('#orgchart-svg .org-node').forEach(el => {
    _orgMakeNodeDraggable(el, svg);
    el.addEventListener('click', (e) => {
      // Only fire click if not dragged
      if (el._wasDragged) { el._wasDragged = false; return; }
      const agent = getAgent(el.dataset.agent);
      if (agent) openAgentPanel(agent, orgStatusMap);
    });
  });
}

function _orgNodeSVG(x, y, name, label, dept, small) {
  const st = orgStatusMap[name] || {};
  const state = st.circuit_state || 'closed';
  const dotColor = state === 'open' ? 'var(--danger)' : state === 'half-open' ? 'var(--warning)' : 'var(--success)';
  const w = small ? 70 : 90;
  const h = small ? 36 : 44;
  const dc = deptColor(dept);
  return `<g class="org-node" data-agent="${name}" data-dept="${dept}" style="cursor:grab">
    <rect x="${x - w/2}" y="${y - h/2}" width="${w}" height="${h}" rx="8"
      fill="var(--elevated)" stroke="${dc}" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="${x - w/2}" y="${y - h/2}" width="${w}" height="3" rx="2" fill="${dc}" opacity="0.7"/>
    <text x="${x}" y="${y + (small ? 2 : -2)}" text-anchor="middle" dominant-baseline="middle"
      fill="var(--text)" font-size="${small ? 7 : 8}" font-weight="700"
      style="pointer-events:none">${label.length > 14 ? label.slice(0,12) + '..' : label}</text>
    ${!small ? `<text x="${x}" y="${y + 10}" text-anchor="middle" fill="var(--muted)" font-size="6"
      style="pointer-events:none">${name.replace(/_agent$/, '').replace(/_/g, ' ')}</text>` : ''}
    <circle cx="${x + w/2 - 8}" cy="${y - h/2 + 8}" r="3" fill="${dotColor}" style="pointer-events:none"/>
  </g>`;
}

function _orgMakeNodeDraggable(el, svg) {
  let startMX, startMY, startNX, startNY, isDragging = false;
  const name = el.dataset.agent;

  el.addEventListener('mousedown', (e) => {
    e.stopPropagation(); // Don't trigger canvas pan
    isDragging = true;
    el._wasDragged = false;
    el.style.cursor = 'grabbing';
    startMX = e.clientX;
    startMY = e.clientY;
    const pos = orgPositions[name];
    startNX = pos.x;
    startNY = pos.y;

    function onMove(e2) {
      if (!isDragging) return;
      const dx = (e2.clientX - startMX) / orgScale;
      const dy = (e2.clientY - startMY) / orgScale;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) el._wasDragged = true;
      orgPositions[name] = { x: startNX + dx, y: startNY + dy };
      _orgUpdateNode(name);
      _orgUpdateEdges(name);
    }
    function onUp() {
      isDragging = false;
      el.style.cursor = 'grab';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function _orgUpdateNode(name) {
  const el = document.querySelector(`#orgchart-svg .org-node[data-agent="${name}"]`);
  if (!el) return;
  const pos = orgPositions[name];
  const isSmall = !name.includes('orchestrator');
  const w = isSmall ? 70 : 90;
  const h = isSmall ? 36 : 44;

  const rect = el.querySelector('rect');
  if (rect) { rect.setAttribute('x', pos.x - w/2); rect.setAttribute('y', pos.y - h/2); }
  const rects = el.querySelectorAll('rect');
  if (rects[1]) { rects[1].setAttribute('x', pos.x - w/2); rects[1].setAttribute('y', pos.y - h/2); }
  const texts = el.querySelectorAll('text');
  texts.forEach(t => { t.setAttribute('x', pos.x); });
  if (texts[0]) texts[0].setAttribute('y', pos.y + (isSmall ? 2 : -2));
  if (texts[1]) texts[1].setAttribute('y', pos.y + 10);
  const circle = el.querySelector('circle');
  if (circle) { circle.setAttribute('cx', pos.x + w/2 - 8); circle.setAttribute('cy', pos.y - h/2 + 8); }
}

function _orgUpdateEdges(name) {
  $$('#orgchart-svg .org-line').forEach(line => {
    const from = line.dataset.from, to = line.dataset.to;
    if (from === name) {
      const p = orgPositions[from];
      if (p) { line.setAttribute('x1', p.x); line.setAttribute('y1', p.y + 22); }
    }
    if (to === name) {
      const p = orgPositions[to];
      if (p) { line.setAttribute('x2', p.x); line.setAttribute('y2', p.y - 18); }
    }
  });
}

function drawOrgChart(statusMap) {
  const svg = $('#orgchart-svg');
  if (!svg) return;
  orgStatusMap = statusMap;
  const W = svg.clientWidth || 1200;

  // Compute initial positions only if not yet set
  if (!orgPositions['company_orchestrator']) {
    _orgComputeLayout(W);
  }

  _orgRedraw();

  // Canvas pan (only when not dragging a node)
  let panning = false, lastX = 0, lastY = 0;
  svg.addEventListener('mousedown', e => {
    if (e.target.closest('.org-node')) return; // node handles its own drag
    panning = true; lastX = e.clientX; lastY = e.clientY;
  });
  svg.addEventListener('mousemove', e => {
    if (!panning) return;
    orgPanX += e.clientX - lastX;
    orgPanY += e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    _orgApplyTransform();
  });
  svg.addEventListener('mouseup', () => { panning = false; });
  svg.addEventListener('mouseleave', () => { panning = false; });
  svg.addEventListener('wheel', e => { e.preventDefault(); orgZoom(e.deltaY < 0 ? 1.1 : 0.9); });
}

function openAgentPanel(agent, statusMap) {

views.supervisor = async function() {
  const el = $('#view-supervisor');
  html(el, `
    <div class="view-header">
      <div class="view-title">Supervisor</div>
      <div class="view-subtitle">Full system observability — circuit breakers, DLQ, pipeline runs, events, evolution</div>

      <button class="sub-tab" data-tab="dlq">Dead Letter Queue</button>
      <button class="sub-tab" data-tab="runs">Pipeline Runs</button>
      <button class="sub-tab" data-tab="events">Event Log</button>
      <button class="sub-tab" data-tab="evolution">Evolution History</button>
    </div>
    <div id="sup-content"></div>
  `);

  async function renderSupTab(tab) {
    const c = $('#sup-content');
    if (tab === 'overview') {
      const stats = await API.get('/api/supervisor/stats') || {};
      html(c, `
        <div class="kpi-grid">
          <div class="kpi-card"><div class="kpi-value" style="color:${stats.open_breakers > 0 ? 'var(--danger)' : 'var(--success)'}">${stats.open_breakers || 0}</div><div class="kpi-label">Open Breakers</div></div>
          <div class="kpi-card"><div class="kpi-value" style="color:${stats.dlq_count > 0 ? 'var(--warning)' : 'var(--success)'}">${stats.dlq_count || 0}</div><div class="kpi-label">DLQ Entries</div></div>
          <div class="kpi-card"><div class="kpi-value" style="color:var(--indigo-light)">${stats.active_runs || 0}</div><div class="kpi-label">Active Runs</div></div>
          <div class="kpi-card"><div class="kpi-value" style="color:var(--text-secondary)">${stats.events_24h || 0}</div><div class="kpi-label">Events (24h)</div></div>
        </div>
        ${stats.open_breakers > 0 ? '<div class="alert-banner alert-danger">Circuit breakers are open — some agents are rate-limited</div>' : ''}
        ${stats.dlq_count > 0 ? '<div class="alert-banner alert-warning">Dead letter queue has blocked pipelines that need attention</div>' : ''}
        ${!stats.open_breakers && !stats.dlq_count ? '<div class="alert-banner alert-success">All systems nominal</div>' : ''}
      `);

    } else if (tab === 'circuits') {
      const circuits = await API.get('/api/supervisor/circuits') || [];
      html(c, `
        <div class="glass-card" style="padding:0;overflow:auto;max-height:calc(100vh - 280px)">
          <table class="data-table"><thead><tr><th>Agent</th><th>Department</th><th>State</th><th>Failures</th><th>Last Failure</th><th>Opened At</th><th>Action</th></tr></thead><tbody>
          ${(circuits.length > 0 ? circuits : AGENTS.filter(a => !a.name.includes('orchestrator')).map(a => ({ agent_name: a.name, state: 'closed', failure_count: 0 }))).map(r => {
            const agent = getAgent(r.agent_name);
            return `<tr style="${r.state === 'open' ? 'background:rgba(239,68,68,0.05)' : ''}">
              <td class="mono">${esc(r.agent_name)}</td>
              <td><span class="${deptClass(agent?.dept)} dept-badge">${esc(agent?.dept) || '—'}</span></td>
              <td><span class="${pillClass(r.state)}">${esc(r.state) || 'closed'}</span></td>
              <td>${r.failure_count || 0}</td>
              <td style="color:var(--muted)">${relTime(r.last_failure_at)}</td>
              <td style="color:var(--muted)">${relTime(r.opened_at)}</td>
              <td>${r.state === 'open' ? `<button class="btn btn-danger btn-sm" onclick="resetCircuit('${esc(r.agent_name)}')">Reset</button>` : ''}</td>
            </tr>`;
          }).join('')}
          </tbody></table>
        </div>
      `);

    } else if (tab === 'dlq') {
      const dlq = await API.get('/api/supervisor/dlq') || [];
      html(c, dlq.length === 0
        ? '<div class="alert-banner alert-success" style="margin-top:16px">No blocked pipelines</div>'
        : `<div class="glass-card" style="padding:0;overflow:auto">
            <table class="data-table"><thead><tr><th>Run ID</th><th>Type</th><th>Blocked On</th><th>Error</th><th>Steps Done</th><th>Created</th><th>Action</th></tr></thead><tbody>
            ${dlq.map(d => `<tr>
              <td class="mono">${truncate(d.run_id, 12)}</td>
              <td>${esc(d.pipeline_type) || '—'}</td>
              <td class="mono" style="color:var(--warning)">${esc(d.blocked_on) || '—'}</td>
              <td class="truncate" title="${esc(d.last_error)}">${truncate(d.last_error, 40)}</td>
              <td>${d.completed_steps_json ? JSON.parse(d.completed_steps_json).length : 0}</td>
              <td style="color:var(--muted)">${relTime(d.created_at)}</td>
              <td><button class="btn btn-primary btn-sm" onclick="resumeDlq('${esc(d.run_id)}')">Resume</button></td>
            </tr>`).join('')}
            </tbody></table>
          </div>`
      );

    } else if (tab === 'runs') {
      const runs = await API.get('/api/supervisor/runs?limit=50') || [];
      html(c, `
        <div class="glass-card" style="padding:0;overflow:auto;max-height:calc(100vh - 280px)">
          <table class="data-table"><thead><tr><th>Run ID</th><th>Type</th><th>Status</th><th>Step</th><th>Created</th><th>Updated</th></tr></thead><tbody>
          ${runs.length === 0 ? '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px">No pipeline runs</td></tr>' :
          runs.map(r => `<tr style="cursor:pointer" onclick="navigate('pipeline')">
            <td class="mono">${truncate(r.run_id, 12)}</td>
            <td>${esc(r.pipeline_type) || '—'}</td>
            <td><span class="${pillClass(r.status)}">${esc(r.status)}</span></td>
            <td>${r.current_step || 0}/${r.total_steps || '?'}</td>
            <td style="color:var(--muted)">${relTime(r.created_at)}</td>
            <td style="color:var(--muted)">${relTime(r.updated_at)}</td>
          </tr>`).join('')}
          </tbody></table>
        </div>
      `);

    } else if (tab === 'events') {
      const events = await API.get('/api/supervisor/events?limit=100') || [];
      html(c, `
        <div class="glass-card" style="padding:0;overflow:auto;max-height:calc(100vh - 280px)">
          <table class="data-table"><thead><tr><th>Time</th><th>Run ID</th><th>Agent</th><th>Event</th><th>Payload</th></tr></thead><tbody>
          ${events.length === 0 ? '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:32px">No events</td></tr>' :
          events.map(e => {
            const agent = getAgent(e.agent_name);
            return `<tr>
              <td style="color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap">${relTime(e.created_at)}</td>
              <td class="mono">${truncate(e.run_id, 8)}</td>
              <td style="color:${deptColor(agent?.dept)};font-family:monospace;font-size:11px">${esc(e.agent_name)}</td>
              <td><span class="${eventBadgeClass(e.event_type)}">${esc(e.event_type)}</span></td>
              <td class="truncate mono" title="${esc(e.payload_json)}">${truncate(e.payload_json, 50)}</td>
            </tr>`;
          }).join('')}
          </tbody></table>
        </div>
      `);

    } else if (tab === 'evolution') {
      const evo = await API.get('/api/supervisor/evolution') || [];
      html(c, `
        <div class="glass-card" style="padding:0;overflow:auto;max-height:calc(100vh - 280px)">
          <table class="data-table"><thead><tr><th>Agent</th><th>Version</th><th>Status</th><th>Score</th><th>Hypothesis</th><th>Confidence</th><th>Created</th></tr></thead><tbody>
          ${evo.length === 0 ? '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:32px">No evolution history — run autoresearcher to start evolving agents</td></tr>' :
          evo.map(e => `<tr>
            <td class="mono">${esc(e.agent_name)}</td>
            <td>v${esc(e.version)}</td>
            <td><span class="${pillClass(e.status)}">${esc(e.status)}</span></td>
            <td>${e.score_baseline?.toFixed(2) || '—'}</td>
            <td class="truncate" title="${esc(e.hypothesis_text)}">${truncate(e.hypothesis_text, 40)}</td>
            <td>${esc(e.confidence) || '—'}</td>
            <td style="color:var(--muted)">${relTime(e.created_at)}</td>
          </tr>`).join('')}
          </tbody></table>
        </div>
      `);
    }
  }

  renderSupTab('overview');

  $$('#sup-tabs .sub-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('#sup-tabs .sub-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderSupTab(btn.dataset.tab);
    });
  });
};

const monitorState = { paused: false, filter: { level: 'all', agent: '', search: '' }, pollId: null };

function classifyEvent(eventType, payload) {
  const t = (eventType || '').toLowerCase();
  const p = (payload || '').toLowerCase();
  if (t.includes('error') || t.includes('fail') || t.includes('circuit_open') || p.includes('error') || p.includes('traceback')) return 'error';
  if (t.includes('warn') || t.includes('retry') || t.includes('dlq') || t.includes('timeout')) return 'warning';
  if (t.includes('success') || t.includes('complete') || t.includes('done')) return 'success';
  return 'info';
}

views.monitor = async function() {
  const el = $('#view-monitor');
  html(el, `
    <div class="view-header">
      <div class="view-title">Monitor</div>
      <div class="view-subtitle">Live log stream — errors, warnings, and agent activity</div>
    </div>
    <div class="monitor-stats" id="monitor-stats"></div>
    <div class="monitor-toolbar" id="monitor-toolbar">
      <select id="mon-level">
        <option value="all">All Levels</option>
        <option value="error">Errors</option>
        <option value="warning">Warnings</option>
        <option value="success">Success</option>
        <option value="info">Info</option>
      </select>
      <select id="mon-agent">
        <option value="">All Agents</option>
        ${AGENTS.map(a => `<option value="${esc(a.name)}">${esc(a.name)}</option>`).join('')}
      </select>
      <input type="text" id="mon-search" placeholder="Search payload..." style="min-width:180px" />
      <div class="spacer"></div>
      <button class="btn btn-sm" id="mon-pause" style="min-width:70px">Pause</button>
      <button class="btn btn-sm btn-primary" id="mon-refresh">Refresh</button>
    </div>
    <div class="monitor-log" id="monitor-log">
      <div style="text-align:center;color:var(--muted);padding:32px">Loading events...</div>
    </div>
  `);

  async function fetchAndRender() {
    const f = monitorState.filter;
    let url = '/api/supervisor/events?limit=200';
    if (f.agent) url += '&agent=' + encodeURIComponent(f.agent);
    const events = await API.get(url) || [];

    // Stats
    let errors = 0, warnings = 0, successes = 0, total = events.length;
    events.forEach(e => {
      const level = classifyEvent(e.event_type, e.payload_json);
      if (level === 'error') errors++;
      else if (level === 'warning') warnings++;
      else if (level === 'success') successes++;
    });
    html($('#monitor-stats'), `
      <div class="monitor-stat"><div class="monitor-stat-value" style="color:var(--text)">${total}</div><div class="monitor-stat-label">Total Events</div></div>
      <div class="monitor-stat"><div class="monitor-stat-value" style="color:var(--danger)">${errors}</div><div class="monitor-stat-label">Errors</div></div>
      <div class="monitor-stat"><div class="monitor-stat-value" style="color:var(--warning)">${warnings}</div><div class="monitor-stat-label">Warnings</div></div>
      <div class="monitor-stat"><div class="monitor-stat-value" style="color:var(--success)">${successes}</div><div class="monitor-stat-label">Success</div></div>
    `);

    // Filter
    const filtered = events.filter(e => {
      const level = classifyEvent(e.event_type, e.payload_json);
      if (f.level !== 'all' && level !== f.level) return false;
      if (f.search) {
        const s = f.search.toLowerCase();
        const haystack = ((e.payload_json || '') + ' ' + (e.event_type || '') + ' ' + (e.agent_name || '')).toLowerCase();
        if (!haystack.includes(s)) return false;
      }
      return true;
    });

    if (filtered.length === 0) {
      html($('#monitor-log'), '<div style="text-align:center;color:var(--muted);padding:32px">No matching events</div>');
      return;
    }

    html($('#monitor-log'), filtered.map(e => {
      const level = classifyEvent(e.event_type, e.payload_json);
      const agent = getAgent(e.agent_name);
      const color = deptColor(agent?.dept);
      let payload = e.payload_json || '';
      if (payload.length > 200) payload = payload.slice(0, 200) + '...';
      return `<div class="log-entry level-${level}">
        <span class="log-time">${relTime(e.created_at)}</span>
        <span class="log-agent" style="color:${color}" title="${esc(e.agent_name)}">${esc(e.agent_name)}</span>
        <span class="log-type"><span class="${eventBadgeClass(e.event_type)}">${esc(e.event_type)}</span></span>
        <span class="log-msg" title="${esc(e.payload_json)}">${esc(payload)}</span>
      </div>`;
    }).join(''));
  }

  fetchAndRender();

  // Filter handlers
  $('#mon-level').addEventListener('change', e => { monitorState.filter.level = e.target.value; fetchAndRender(); });
  $('#mon-agent').addEventListener('change', e => { monitorState.filter.agent = e.target.value; fetchAndRender(); });
  $('#mon-search').addEventListener('input', e => { monitorState.filter.search = e.target.value; fetchAndRender(); });
  $('#mon-refresh').addEventListener('click', fetchAndRender);
  $('#mon-pause').addEventListener('click', () => {
    monitorState.paused = !monitorState.paused;
    $('#mon-pause').textContent = monitorState.paused ? 'Resume' : 'Pause';
    $('#mon-pause').classList.toggle('btn-warning', monitorState.paused);
  });

  // Auto-refresh every 5s when on monitor view
  clearInterval(monitorState.pollId);
  monitorState.pollId = setInterval(() => {
    if (S.view === 'monitor' && !monitorState.paused) fetchAndRender();
  }, 5000);
};

let _btLastUrl = '';

async function _btRefresh() {
  // Fetch active builds
  const active = await API.get('/api/build/active');
  const workersEl = $('#bt-workers');
  const phasesEl = $('#bt-phases');
  if (!workersEl || !phasesEl) return;

  // Determine workers and their current tasks
  let builds = (active && active.active_builds) || [];
  let claudePhase = null, opencodePhase = null, allPhases = [];

  if (builds.length > 0) {
    const latest = builds[0];
    const progress = await API.get('/api/build/progress/' + latest.product_id);
    allPhases = (progress && progress.phases) || [];

    let claudeLast = null, opencodeLast = null;
    for (const p of allPhases) {
      const msg = (p.message || '').toLowerCase();
      const isOpencode = msg.includes('[opencode]') || p.phase.includes('frontend');
      const isClaude = msg.includes('[claude]') || p.phase.includes('backend') || p.phase === 'scaffold' || p.phase === 'server_start';
      if (p.status === 'running') {
        if (isOpencode) opencodePhase = p;
        else claudePhase = p;
      }
      if (p.status === 'completed') {
        if (isOpencode) opencodeLast = p;
        else claudeLast = p;
      }
    }
    // Check for URL in completed phases
    for (const p of allPhases) {
      const urlMatch = (p.message || '').match(/https?:\/\/localhost:\d+/);
      if (urlMatch) _btLastUrl = urlMatch[0];
    }
  }

  // Also check console preview URL
  if (S.previewUrl) _btLastUrl = S.previewUrl;

  // Render worker cards — show active phase, or last completed if idle
  workersEl.innerHTML = _btWorkerCard('Claude Code', 'claude', claudePhase, claudeLast)
                      + _btWorkerCard('OpenCode', 'opencode', opencodePhase, opencodeLast);

  // Render phase timeline
  const countEl = $('#bt-phase-count');
  if (countEl) countEl.textContent = allPhases.length + ' phases';

  if (allPhases.length === 0) {
    phasesEl.innerHTML = '<div class="empty-state"><div class="empty-state-text">No active builds — start one from Console</div></div>';
  } else {
    phasesEl.innerHTML = allPhases.map(p => {
      const statusColor = p.status === 'completed' ? 'var(--success)'
        : p.status === 'running' ? 'var(--info)'
        : p.status === 'failed' ? 'var(--danger)' : 'var(--muted)';
      const statusIcon = p.status === 'completed' ? '&#10004;'
        : p.status === 'running' ? '&#9654;'
        : p.status === 'failed' ? '&#10007;' : '&#9679;';
      const duration = p.duration_s ? (p.duration_s).toFixed(1) + 's' : '';
      const backend = (p.message || '').match(/\[(claude|opencode)\]/i);
      const backendBadge = backend ? '<span style="background:' + (backend[1].toLowerCase() === 'claude' ? 'var(--indigo)' : 'var(--success)') + ';color:#fff;padding:1px 6px;border-radius:4px;font-size:9px;margin-left:6px">' + esc(backend[1]) + '</span>' : '';
      return '<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-left:3px solid ' + statusColor + ';margin-bottom:4px;border-radius:4px;background:rgba(255,255,255,0.02)">'
        + '<span style="color:' + statusColor + ';font-size:12px">' + statusIcon + '</span>'
        + '<span style="font-family:monospace;font-size:11px;font-weight:600;min-width:140px">' + esc(p.phase) + backendBadge + '</span>'
        + '<span style="color:var(--text-secondary);font-size:11px;flex:1">' + esc((p.message || '').replace(/\[(claude|opencode)\]\s*/i, '').slice(0, 80)) + '</span>'
        + '<span style="font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums">' + duration + '</span>'
        + '</div>';
    }).join('');
  }

  // Update live preview
  const previewBody = $('#bt-preview-body');
  const previewTitle = $('#bt-preview-title');
  const reloadBtn = $('#bt-reload-btn');
  const openBtn = $('#bt-open-btn');
  if (_btLastUrl && previewBody) {
    if (!previewBody.querySelector('iframe')) {
      previewBody.innerHTML = '<iframe id="bt-preview-frame" src="' + _btLastUrl + '" style="width:100%;height:100%;border:none;background:#fff;border-radius:0 0 12px 12px"></iframe>'
        + '<div class="console-preview-toolbar"><span class="url-bar">' + _btLastUrl + '</span><button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="btToggleAutoReload()">Auto-reload: <span id="bt-autoreload-label">ON</span></button></div>';
      previewBody.style.padding = '0';
      previewBody.style.display = 'flex';
      previewBody.style.flexDirection = 'column';
      // Auto-reload iframe every 10s during active builds
      _btAutoReload = setInterval(() => {
        const f = document.getElementById('bt-preview-frame');
        if (f && _btLastUrl && _btAutoReloadOn) { try { f.contentWindow.location.reload(); } catch(e) { f.src = _btLastUrl; } }
      }, 10000);
    }
    if (previewTitle) previewTitle.style.color = 'var(--success)';
    if (reloadBtn) reloadBtn.disabled = false;
    if (openBtn) openBtn.disabled = false;
  }
}

function _btWorkerCard(name, type, activePhase, lastPhase) {
  const isActive = !!activePhase;
  const showPhase = activePhase || lastPhase;
  const borderColor = isActive ? (type === 'claude' ? 'var(--indigo)' : 'var(--success)') : 'var(--border)';
  const dotColor = isActive ? borderColor : (lastPhase ? 'var(--success)' : 'var(--muted)');
  const statusLabel = isActive ? 'Working' : (lastPhase ? 'Done' : 'Idle');
  const statusColor = isActive ? (type === 'claude' ? 'var(--indigo-light)' : 'var(--success)') : (lastPhase ? 'var(--success)' : 'var(--muted)');
  const phase = showPhase ? showPhase.phase : '—';
  const msg = showPhase ? (showPhase.message || '').replace(/\[(claude|opencode)\]\s*/i, '').replace(/\u001b\[[0-9;]*m/g, '').slice(0, 60) : 'No tasks yet';
  const duration = showPhase && showPhase.duration_s ? (showPhase.duration_s).toFixed(1) + 's' : '';
  return '<div style="background:var(--surface);border:1px solid ' + borderColor + ';border-radius:10px;padding:14px 16px">'
    + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
    + '<span class="status-dot' + (isActive ? ' pulse' : '') + '" style="width:8px;height:8px;background:' + dotColor + '"></span>'
    + '<span style="font-weight:700;font-size:13px">' + name + '</span>'
    + '<span style="margin-left:auto;font-size:10px;color:' + statusColor + ';font-weight:600;text-transform:uppercase">' + statusLabel + '</span>'
    + '</div>'
    + '<div style="font-family:monospace;font-size:12px;color:var(--indigo-light);margin-bottom:4px">' + esc(phase) + (duration ? ' <span style="color:var(--muted);font-size:10px">(' + duration + ')</span>' : '') + '</div>'
    + '<div style="font-size:11px;color:var(--text-secondary)">' + esc(msg) + '</div>'
    + '</div>';
}

function btReloadPreview() {
  const frame = document.getElementById('bt-preview-frame');
  if (frame && _btLastUrl) frame.src = _btLastUrl;
}

function btOpenPreview() {
  if (_btLastUrl) window.open(_btLastUrl, '_blank');
}

let _btAutoReload = null;
let _btAutoReloadOn = true;
function btToggleAutoReload() {
  _btAutoReloadOn = !_btAutoReloadOn;
  const label = document.getElementById('bt-autoreload-label');
  if (label) label.textContent = _btAutoReloadOn ? 'ON' : 'OFF';
  if (!_btAutoReloadOn && _btAutoReload) { clearInterval(_btAutoReload); _btAutoReload = null; }
}

// ── Polling Manager ───────────────────────────────────────────────────────
function startPolling() {
  refreshTopBar();
  S.pollTimer = setInterval(refreshTopBar, 5000);
}

// ── Boot ──────────────────────────────────────────────────────────────────
startPolling();
navigate('dashboard');
