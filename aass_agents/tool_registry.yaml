# Tool Registry — capability and department metadata for all tools.
# Used by tool_registry.py for dynamic discovery and tool_mask.py for capability-based masking.

tools:
  # ── Research & Enrichment ──────────────────────────────────────────────────
  deep_research:
    module: tools.research_tools
    capabilities: [research, web, analysis]
    departments: [all]
    tier: std
    description: "Deep research on a topic using multiple sources"

  search_company_web:
    module: tools.research_tools
    capabilities: [research, web, company]
    departments: [sales, marketing, research]
    tier: fast
    description: "Search the web for company information"

  enrich_company:
    module: tools.research_tools
    capabilities: [research, enrichment, company]
    departments: [sales, marketing]
    tier: fast
    description: "Enrich company data with additional details"

  find_contacts:
    module: tools.research_tools
    capabilities: [research, contacts, company]
    departments: [sales]
    tier: fast
    description: "Find contact information for company employees"

  search_news:
    module: tools.research_tools
    capabilities: [research, news, web]
    departments: [sales, marketing, research]
    tier: fast
    description: "Search recent news about a company or topic"

  # ── Browser Automation ─────────────────────────────────────────────────────
  navigate_and_read:
    module: tools.browser_tools
    capabilities: [browser, web, read]
    departments: [all]
    tier: fast
    description: "Navigate to a URL and read page content"

  browser_screenshot:
    module: tools.browser_tools
    capabilities: [browser, web, visual]
    departments: [all]
    tier: fast
    description: "Take a screenshot of a web page"

  browser_extract_links:
    module: tools.browser_tools
    capabilities: [browser, web, read]
    departments: [all]
    tier: fast
    description: "Extract all links from a web page"

  browser_crawl:
    module: tools.browser_tools
    capabilities: [browser, web, crawl]
    departments: [sales, marketing, research]
    tier: std
    description: "Crawl multiple pages from a website"

  browser_click:
    module: tools.browser_tools
    capabilities: [browser, web, interact]
    departments: [all]
    tier: fast
    description: "Click an element on a web page"

  browser_fill_form:
    module: tools.browser_tools
    capabilities: [browser, web, interact, write]
    departments: [all]
    tier: fast
    description: "Fill out a form on a web page"

  # ── Memory & Context ───────────────────────────────────────────────────────
  save_deal_context:
    module: tools.memory_tools
    capabilities: [memory, write, deals]
    departments: [sales]
    tier: fast
    description: "Save deal context to persistent memory"

  recall_deal_context:
    module: tools.memory_tools
    capabilities: [memory, read, deals]
    departments: [sales]
    tier: fast
    description: "Recall deal context from persistent memory"

  list_active_deals:
    module: tools.memory_tools
    capabilities: [memory, read, deals]
    departments: [sales]
    tier: fast
    description: "List all active deals in memory"

  save_agent_output:
    module: tools.memory_tools
    capabilities: [memory, write]
    departments: [all]
    tier: fast
    description: "Save agent output for future reference"

  recall_past_outputs:
    module: tools.memory_tools
    capabilities: [memory, read]
    departments: [all]
    tier: fast
    description: "Recall past agent outputs"

  save_product_state:
    module: tools.product_memory_tools
    capabilities: [memory, write, product]
    departments: [product]
    tier: fast
    description: "Save product pipeline state"

  recall_product_state:
    module: tools.product_memory_tools
    capabilities: [memory, read, product]
    departments: [product]
    tier: fast
    description: "Recall product pipeline state"

  # ── Todo & Tracking ────────────────────────────────────────────────────────
  write_todo:
    module: tools.todo_tools
    capabilities: [tracking, write]
    departments: [all]
    tier: fast
    description: "Write a todo list for session tracking"

  read_todo:
    module: tools.todo_tools
    capabilities: [tracking, read]
    departments: [all]
    tier: fast
    description: "Read current todo list"

  complete_todo_step:
    module: tools.todo_tools
    capabilities: [tracking, write]
    departments: [all]
    tier: fast
    description: "Mark a todo step as complete"

  get_todo_summary:
    module: tools.todo_tools
    capabilities: [tracking, read]
    departments: [all]
    tier: fast
    description: "Get summary of todo progress"

  # ── Code & Build ───────────────────────────────────────────────────────────
  build_and_run:
    module: tools.claude_code_tools
    capabilities: [build, code, execute]
    departments: [product, engineering]
    tier: std
    description: "Build and run code using Claude Code CLI"

  build_review_improve:
    module: tools.claude_code_tools
    capabilities: [build, code, review]
    departments: [product, engineering]
    tier: std
    description: "Build, review, and improve code iteratively"

  build_with_feedback_loop:
    module: tools.claude_code_tools
    capabilities: [build, code, feedback]
    departments: [product]
    tier: deep
    description: "Multi-phase build with human feedback loop"

  open_in_browser:
    module: tools.claude_code_tools
    capabilities: [browser, utility]
    departments: [product]
    tier: fast
    description: "Open a URL in the default browser"

  # ── GitHub ─────────────────────────────────────────────────────────────────
  search_github_repos:
    module: tools.github_tools
    capabilities: [research, code, github]
    departments: [product, engineering, research]
    tier: fast
    description: "Search GitHub repositories"

  search_github_code:
    module: tools.github_tools
    capabilities: [research, code, github]
    departments: [product, engineering, research]
    tier: fast
    description: "Search code on GitHub"

  # ── Deployment ─────────────────────────────────────────────────────────────
  deploy_to_railway:
    module: tools.railway_tools
    capabilities: [deploy, infrastructure]
    departments: [product, engineering]
    tier: std
    description: "Deploy application to Railway"

  deploy_to_vercel:
    module: tools.vercel_tools
    capabilities: [deploy, infrastructure]
    departments: [product, engineering]
    tier: std
    description: "Deploy application to Vercel"

  # ── Skill Memory ──────────────────────────────────────────────────────────
  find_similar_skills:
    module: tools.skill_memory
    capabilities: [memory, read, skills]
    departments: [product, forge]
    tier: fast
    description: "Find similar past builds for skill reuse"

  save_learned_skill:
    module: tools.skill_memory
    capabilities: [memory, write, skills]
    departments: [product, forge]
    tier: fast
    description: "Save a learned skill from a build"

  # ── Feedback ───────────────────────────────────────────────────────────────
  get_feedback_history:
    module: tools.human_feedback_loop
    capabilities: [feedback, read]
    departments: [product]
    tier: fast
    description: "Get feedback history for a product build"

  get_feedback_patterns:
    module: tools.human_feedback_loop
    capabilities: [feedback, read, analysis]
    departments: [product]
    tier: fast
    description: "Get common feedback patterns across builds"

  # ── Inter-Agent Messaging ──────────────────────────────────────────────────
  send_agent_message:
    module: tools.message_bus
    capabilities: [messaging, write]
    departments: [all]
    tier: fast
    description: "Send a message to another agent"

  check_agent_messages:
    module: tools.message_bus
    capabilities: [messaging, read]
    departments: [all]
    tier: fast
    description: "Check for pending messages from other agents"

  reply_to_agent:
    module: tools.message_bus
    capabilities: [messaging, write]
    departments: [all]
    tier: fast
    description: "Reply to a message from another agent"

  # ── Tool Discovery ─────────────────────────────────────────────────────────
  discover_tools:
    module: tools.tool_registry
    capabilities: [meta, discovery]
    departments: [all]
    tier: fast
    description: "Discover available tools by capability or department"

  # ── Parallel Execution ─────────────────────────────────────────────────────
  run_parallel_pipeline:
    module: tools.parallel_executor
    capabilities: [orchestration, parallel]
    departments: [product, research, qa, sales]
    tier: std
    description: "Execute a named parallel pipeline"

  # ── Build Progress ─────────────────────────────────────────────────────────
  log_build_phase:
    module: tools.build_progress
    capabilities: [tracking, write, build]
    departments: [product]
    tier: fast
    description: "Log a build phase status update"

  get_build_progress:
    module: tools.build_progress
    capabilities: [tracking, read, build]
    departments: [product]
    tier: fast
    description: "Get build phase progress for a product"

  # ── Knowledge Graph ────────────────────────────────────────────────────────
  build_knowledge_graph:
    module: tools.graph_tools
    capabilities: [knowledge_graph, analysis, code]
    departments: [research, engineering, product]
    tier: std
    description: "Build a knowledge graph from code, docs, papers, or images"

  update_knowledge_graph:
    module: tools.graph_tools
    capabilities: [knowledge_graph, analysis, code]
    departments: [research, engineering, product]
    tier: std
    description: "Incrementally update an existing knowledge graph"

  query_knowledge_graph:
    module: tools.graph_tools
    capabilities: [knowledge_graph, analysis, query]
    departments: [all]
    tier: fast
    description: "Query the knowledge graph with natural language"

  find_graph_path:
    module: tools.graph_tools
    capabilities: [knowledge_graph, analysis, query]
    departments: [all]
    tier: fast
    description: "Find relationship path between two entities"

  explain_entity:
    module: tools.graph_tools
    capabilities: [knowledge_graph, analysis, query]
    departments: [all]
    tier: fast
    description: "Get detailed explanation of an entity and its relationships"

  add_to_knowledge_graph:
    module: tools.graph_tools
    capabilities: [knowledge_graph, research, web]
    departments: [research, engineering]
    tier: std
    description: "Add content from a URL (papers, tweets, web pages) to the graph"

  export_knowledge_graph:
    module: tools.graph_tools
    capabilities: [knowledge_graph, export]
    departments: [all]
    tier: fast
    description: "Export knowledge graph as JSON, GraphML, SVG, or Neo4j Cypher"

  # ── Obsidian Vault ─────────────────────────────────────────────────────────
  vault_read_note:
    module: tools.vault_tools
    capabilities: [vault, read, knowledge]
    departments: [all]
    tier: fast
    description: "Read a note from the Obsidian vault"

  vault_write_note:
    module: tools.vault_tools
    capabilities: [vault, write, knowledge]
    departments: [all]
    tier: fast
    description: "Create or overwrite a note in the Obsidian vault"

  vault_append_note:
    module: tools.vault_tools
    capabilities: [vault, write, knowledge]
    departments: [all]
    tier: fast
    description: "Append content to an existing vault note"

  vault_search:
    module: tools.vault_tools
    capabilities: [vault, search, knowledge]
    departments: [all]
    tier: fast
    description: "Search notes in the vault by keyword"

  vault_list_notes:
    module: tools.vault_tools
    capabilities: [vault, read, knowledge]
    departments: [all]
    tier: fast
    description: "List notes in a vault folder"

  vault_delete_note:
    module: tools.vault_tools
    capabilities: [vault, write, knowledge]
    departments: [all]
    tier: fast
    description: "Delete a vault note (moves to .trash for safety)"

  # ── Website Cloner ─────────────────────────────────────────────────────────
  clone_website_recon:
    module: tools.website_cloner_tools
    capabilities: [clone, browser, design, analysis]
    departments: [product, engineering]
    tier: std
    description: "Phase 1: Screenshot, extract design tokens and section map from a URL"

  clone_website_extract_spec:
    module: tools.website_cloner_tools
    capabilities: [clone, browser, design, analysis]
    departments: [product, engineering]
    tier: std
    description: "Phase 2: Extract detailed component spec for a single page section"

  clone_website_extract_all_specs:
    module: tools.website_cloner_tools
    capabilities: [clone, browser, design, analysis]
    departments: [product, engineering]
    tier: std
    description: "Phase 2 batch: Extract component specs for all page sections"

  clone_website_generate:
    module: tools.website_cloner_tools
    capabilities: [clone, code, build, design]
    departments: [product, engineering]
    tier: deep
    description: "Phase 3: Full pipeline — recon, spec, and generate cloned frontend code"

  # ── Cognition Base (ASI-Evolve) ──────────────────────────────────────────
  search_cognition:
    module: tools.cognition_base_tools
    capabilities: [knowledge, search, evolution, cognition]
    departments: [all]
    tier: fast
    description: "Semantic search over the cognition base — retrieves domain knowledge, heuristics, and proven patterns"

  add_cognition:
    module: tools.cognition_base_tools
    capabilities: [knowledge, write, evolution, cognition]
    departments: [all]
    tier: fast
    description: "Add a new knowledge entry to the cognition base with auto-embedding"

  seed_cognition_from_skills:
    module: tools.cognition_base_tools
    capabilities: [knowledge, seed, evolution, cognition]
    departments: [all]
    tier: std
    description: "Seed the cognition base from existing SKILL.md files across all departments"

  get_cognition_stats:
    module: tools.cognition_base_tools
    capabilities: [knowledge, stats, evolution, cognition]
    departments: [all]
    tier: fast
    description: "Return cognition base statistics — total entries and per-domain breakdown"

  # ── Cross-Agent Learning (ASI-Evolve) ────────────────────────────────────
  extract_transfer_patterns:
    module: tools.cross_agent_learning
    capabilities: [evolution, transfer, learning, cognition]
    departments: [all]
    tier: std
    description: "Extract transferable patterns from a successful agent evolution and queue for sibling agents"

  get_transfer_suggestions:
    module: tools.cross_agent_learning
    capabilities: [evolution, transfer, learning, cognition]
    departments: [all]
    tier: fast
    description: "Get cognition-based improvement suggestions for an agent from its department peers"

  # ── Population Evolution (ASI-Evolve UCB1) ───────────────────────────────
  sample_parent_ucb1:
    module: tools.evolution_tools
    capabilities: [evolution, sampling, population]
    departments: [all]
    tier: fast
    description: "Select a parent instruction candidate using UCB1 exploration-exploitation balance"

  add_candidate:
    module: tools.evolution_tools
    capabilities: [evolution, population, write]
    departments: [all]
    tier: fast
    description: "Add a new instruction candidate to the population pool for an agent"

  record_candidate_reward:
    module: tools.evolution_tools
    capabilities: [evolution, population, scoring]
    departments: [all]
    tier: fast
    description: "Record a quality reward signal for a candidate instruction"

  maintain_population:
    module: tools.evolution_tools
    capabilities: [evolution, population, cleanup]
    departments: [all]
    tier: fast
    description: "Retire underperforming candidates to maintain pool size (10 per agent)"

  promote_champion:
    module: tools.evolution_tools
    capabilities: [evolution, population, promotion]
    departments: [all]
    tier: fast
    description: "Promote the best-performing candidate to champion status"

  get_candidate_lineage:
    module: tools.evolution_tools
    capabilities: [evolution, population, history]
    departments: [all]
    tier: fast
    description: "Trace the ancestry of a candidate through its parent chain"
